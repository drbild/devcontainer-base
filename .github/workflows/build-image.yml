name: Build and Push Base Image

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Monday 06:00 UTC — keep upstream base + tools fresh
  workflow_dispatch:

concurrency:
  group: build-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYY-MM-DD-HHmmss'}}

      # Build a single-arch image locally so we can smoke-test it before pushing.
      - name: Build (local, amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          push: false
          tags: devcontainer-base:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test
        run: |
          run() { docker run --rm -u vscode devcontainer-base:test "$@"; }
          run git --version
          run zsh --version
          run gh --version
          run mise --version
          run claude --version

      # Push the real multi-arch image (amd64 + arm64 for Apple Silicon hosts).
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
